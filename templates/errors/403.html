{% extends "base.html" %}
{% block title %}Access Denied — TWG Mobile{% endblock %}
{% block header_title %}Access Denied{% endblock %}

{% block content %}
<div class="page-padding text-center" style="padding-top: 64px;">
    <div class="error-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-danger)" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M4.93 4.93l14.14 14.14"/>
        </svg>
    </div>
    <h1 class="error-title">Access Denied</h1>
    <p class="error-message">You don't have permission to view this page. Contact your manager if you believe this is an error.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-16">Go Home</a>
</div>
{% endblock %}
