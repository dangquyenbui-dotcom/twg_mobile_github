{% extends "base.html" %}
{% block title %}Server Error — TWG Mobile{% endblock %}
{% block header_title %}Error{% endblock %}

{% block content %}
<div class="page-padding text-center" style="padding-top: 64px;">
    <div class="error-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-danger)" stroke-width="1.5">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
    </div>
    <h1 class="error-title">Something Went Wrong</h1>
    <p class="error-message">An unexpected error occurred. Please try again or contact support if the problem persists.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-16">Go Home</a>
</div>
{% endblock %}
