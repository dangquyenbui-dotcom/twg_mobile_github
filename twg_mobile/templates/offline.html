<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a2332">
    <title>Offline — TWG Mobile</title>
    <style>
        :root {
            --color-primary: #1a2332;
            --color-accent: #e8731a;
            --color-bg: #f4f5f7;
            --color-text: #1a2332;
            --color-text-secondary: #6b7280;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
                         Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            text-align: center;
        }
        .offline-icon {
            margin-bottom: 24px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            font-size: 15px;
            color: var(--color-text-secondary);
            line-height: 1.5;
            max-width: 300px;
            margin-bottom: 32px;
        }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: var(--color-accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
        }
        .retry-btn:active { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="offline-icon">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none"
             stroke="var(--color-text-secondary)" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 1l22 22"/>
            <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0122.56 9"/>
            <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 016.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
    </div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again. Some features may not be available offline.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
