{% extends "base.html" %}

{% block title %}Sign In — TWG Mobile{% endblock %}
{% block header_title %}TWG Mobile{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <!-- Placeholder — replace with actual TWG logo -->
            <div class="login-logo-text">TWG</div>
        </div>
        <h1 class="login-heading">The Wheel Group</h1>
        <p class="login-subheading">Mobile Sales Portal</p>

        <a href="{{ url_for('auth.login_start') }}" class="btn btn-primary btn-block login-btn">
            <svg class="btn-icon" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
                <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
                <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
                <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
            </svg>
            Sign in with Microsoft
        </a>
    </div>

    <div class="login-footer">
        <p>&copy; {{ "now"|default("2026") }} The Wheel Group. All rights reserved.</p>
    </div>
</div>
{% endblock %}
